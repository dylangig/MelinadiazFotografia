<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ trabajo.capitalize() }} - Fotos</title>
    <style>
        body { font-family: sans-serif; background-color: #fff0f5; text-align: center; }
        .galeria-fotos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            padding: 20px;
        }
        .galeria-fotos img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .volver { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #d63384; font-weight: bold; }
    </style>
</head>
<body>
    <h1>{{ trabajo.replace('_', ' ').capitalize() }}</h1>
    <a href="/galeria/{{ categoria }}" class="volver">← Volver a trabajos</a>

    <div class="galeria-fotos">
        {% for foto in fotos %}
            <img src="{{ url_for('static', filename='imagenes/' + categoria + '/' + trabajo + '/' + foto) }}">
        {% endfor %}
    </div>
</body>
</html>
