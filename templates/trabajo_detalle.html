{% extends "base.html" %}

{% block contenido %}
<style>
    .encabezado-minimalista {
        text-align: center;
        margin: 40px 0 30px;
    }
    .titulo-galeria {
        font-family: 'Playfair Display', "https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Playfair+Display:wght@700&display=swap";
        color: #d81b60;
        font-weight: 400;
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 10px;
    }
    .link-volver {
        color: #f48fb1;
        text-decoration: none;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .link-volver:hover { color: #d81b60; }
    .grilla-fotografica {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        width: 100%;
    }
    .item-foto {
        aspect-ratio: 1 / 1;
        overflow: hidden;
        border-radius: 6px;
        background-color: #f0e6ec;
    }
    .item-foto img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s ease;
        cursor: pointer;
        display: block;
    }
    .item-foto:hover img { transform: scale(1.05); }
    @media (max-width: 992px) {
        .grilla-fotografica { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 576px) {
        .grilla-fotografica { grid-template-columns: repeat(2, 1fr); gap: 6px; }
    }
</style>

<div class="encabezado-minimalista">
    <h1 class="titulo-galeria">Sesión de {{ trabajo.nombre }}</h1>
    <a href="{{ url_for('ver_categoria', categoria_slug=categoria) }}" class="link-volver">
        &larr; Volver a {{ categoria.replace('_', ' ').capitalize() }}
    </a>
</div>

<div class="grilla-fotografica">
    {% for foto in fotos %}
    <div class="item-foto">
        <a href="/static/imagenes/{{ categoria }}/{{ trabajo.slug }}/{{ foto }}"
           class="glightbox"
           data-gallery="galeria-sesion">
            <img src="/static/imagenes/{{ categoria }}/{{ trabajo.slug }}/{{ foto }}"
                 alt="Foto {{ loop.index }}"
                 loading="lazy">
        </a>
    </div>
    {% endfor %}
</div>
{% endblock %}
