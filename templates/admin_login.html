{% extends "base.html" %}
{% block contenido %}
<div style="max-width: 400px; margin: 80px auto; text-align: center;">
    <h2 style="color: #d81b60; margin-bottom: 30px;">Panel Admin</h2>
    {% with msgs = get_flashed_messages() %}
        {% if msgs %}
            <p style="color: red; margin-bottom: 16px;">{{ msgs[0] }}</p>
        {% endif %}
    {% endwith %}
    <form method="POST" action="/admin">
        <input type="password" name="password" placeholder="Contraseña"
               style="width:100%; padding:12px; border-radius:8px; border:1px solid #f48fb1;
                      font-size:16px; margin-bottom:16px; text-align:center;">
        <button type="submit"
                style="width:100%; padding:12px; background:#d81b60; color:white;
                       border:none; border-radius:25px; font-size:16px; cursor:pointer;">
            Entrar
        </button>
    </form>
</div>
{% endblock %}
